name: the_base
description: The Base — Billetera del Mesero. Offline-first waiter billing and KDS system.
publish_to: "none"
version: 1.8.0+19

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Local Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Navigation
  go_router: ^14.2.8

  # Camera & File System
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  permission_handler: ^11.3.1

  # Sharing
  share_plus: ^10.1.4

  # Image processing (rotation / re-encoding)
  image: ^4.3.0

  # Utilities
  crypto: ^3.0.3
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  flutter_local_notifications: ^17.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generators
  build_runner: ^2.4.11
  isar_generator: ^3.1.0+1

  # Launcher icon generator
  flutter_launcher_icons: ^0.14.3

  # Linting
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo/LogoSinTexto.png"
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "assets/logo/LogoSinTexto.png"
  min_sdk_android: 21
  web:
    generate: false
